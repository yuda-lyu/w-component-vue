<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zh-tw">
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>w-component-vue</title>

    <!-- @babel/polyfill -->
    <script
        nomodule
        src="https://cdn.jsdelivr.net/npm/@babel/polyfill/dist/polyfill.min.js"
    ></script>

    <!-- vue -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.min.js"></script>

    <!-- extractHtmlе·ІиҮӘеӢ•ж·»еҠ @babel/polyfillиҲҮvue -->

    <!-- vuetify -->
    <link
        href="https://cdn.jsdelivr.net/npm/vuetify@2.6.14/dist/vuetify.min.css"
        rel="stylesheet"
    />
    <script
        src="https://cdn.jsdelivr.net/npm/vuetify@2.6.14/dist/vuetify.min.js"
    ></script>

    <!-- fontawesome -->
    <link
        href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/all.min.css"
        rel="stylesheet"
    />

    <!-- mdi, еҗ„зө„д»¶дҪҝз”Ёmdi/jsжңғж–јиҪүе–®й ҒжҷӮж”№зӮәmdi icon, ж•…йңҖеј•з”Ёmdi/css -->
    <link
        href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css"
        rel="stylesheet"
    />

    <!-- google, еҗ„зө„д»¶дҪҝз”Ёmdi/jsж•…дёҚйңҖеј•з”Ё -->
    <link
        _href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900"
        rel="stylesheet"
    />
    <link
        _href="https://fonts.googleapis.com/css?family=Material+Icons"
        rel="stylesheet"
    />

    <!-- data -->
    <script
        src="https://cdn.jsdelivr.net/npm/w-demores@1.0.27/res/data/dataAAPL.js"
    ></script>
    <script
        src="https://cdn.jsdelivr.net/npm/w-demores@1.0.27/res/data/dataUSD2EUR.js"
    ></script>
    <script
        src="https://cdn.jsdelivr.net/npm/w-demores@1.0.27/res/data/dataTemperature.js"
    ></script>
    <script
        src="https://cdn.jsdelivr.net/npm/w-demores@1.0.27/res/data/dataHousePriceArea.js"
    ></script>
    <script
        src="https://cdn.jsdelivr.net/npm/w-demores@1.0.27/res/data/dataFlare.js"
    ></script>
    <script
        src="https://cdn.jsdelivr.net/npm/w-demores@1.0.27/res/data/dataRain.js"
    ></script>
    <script
        src="https://cdn.jsdelivr.net/npm/w-demores@1.0.27/res/data/dataRainClip.js"
    ></script>
    <script
        src="https://cdn.jsdelivr.net/npm/w-demores@1.0.27/res/data/dataCivilSoilCodeIcon.js"
    ></script>

    <!-- w-component-vue -->
    <script src="https://cdn.jsdelivr.net/npm/w-component-vue@2.4.42/dist/w-component-vue.umd.js"></script>

    <style>
  .v-application--wrap {
    /* widthиҲҮmax-width fix for IE11, е…¶еӨ–дёҚиғҪдҪҝз”ЁpaddingжҲ–marginйҒҝе…ҚеӨұж•Ҳ */
    width: 100svw;
    max-width: 100svw;
    font-family: inherit;
    background: #fff;
  }
  /* зө„д»¶жүҖй Ҳе…ЁеҹҹжЁЈејҸ */
  .item {
    /* еӣ itemдҪҚж–јdemolink, жҸҗеҸ–еҗ„зҜ„дҫӢhtmlеҫҢжңғеҲӘйҷӨdemolink, ж•…еҫ—йЎҚеӨ–иЈңдёҠ */
    border-left: 3px solid #ffba75;
    margin: 5px 5px 8px 0px;
    padding: 3px 3px 5px 10px;
    font-size: 0.9rem;
    display: flex;
    justify-content: flex-start;
    align-items: center;
  }
  .head1 {
    padding: 0px 0px 20px 0px;
    font-size: 2.5rem;
  }
  .bkh {
    /* еҜ¬ */
    padding: 20px;
  }
  @media screen and (max-width: 800px) {
    /* дёӯ */
    .bkh {
      padding: 10px;
    }
  }
  @media screen and (max-width: 400px) {
    /* зӘ„ */
    .bkh {
      padding: 5px;
    }
  }
  .bk {
    /* еҜ¬ */
    display: inline-block;
    vertical-align: top;
    padding: 0px 80px 60px 0px;
  }
  @media screen and (max-width: 1000px) {
    /* дёӯзӘ„ */
    .bk {
      display: block;
      padding: 0px 0px 50px 0px;
    }
  }
  .cpitem {
    transition: all 0.3s;
    padding: 5px 15px;
    cursor: pointer;
  }
  .cpitem-white {
    background: #fff;
  }
  .cpitem-white:hover {
    background: #eee;
  }
  .cpitem-black {
    background: #333;
  }
  .cpitem-black:hover {
    background: #555;
  }
    </style>
</head>
<body
    style="font-family:'Microsoft JhengHei','Avenir','Helvetica'; padding:0px; margin:0px;"
>
    <v-app id="app" class="bkh" style="font-family:inherit;">
        <div class="head1">
            <span
                style="cursor:pointer;"
                title="open for copy link to view component"
                onclick="window.open('//yuda-lyu.github.io/w-component-vue/examples/app.html?cmp='+this.innerText,'_blank')"
            >w-timeminute-range</span>
        </div>
        <div class="bk">
            <div class="item">icon &amp; iconSize &amp; placementDistY</div>

            <w-timeminute-range
                :icon="'mdi-check-underline-circle'"
                :icon-size="20"
                :placement-dist-y="6"
                :minute-start.sync="WTimeminuteRange.minuteStart"
                :minute-end.sync="WTimeminuteRange.minuteEnd"
            ></w-timeminute-range>
        </div>
    </v-app>

    <script>
  //install
  Vue.use(window["w-component-vue"]);

  //initialize
  new Vue({
    el: "#app",
    vuetify: new Vuetify(),
    data: function() {
      return {
        WTimeminuteRange: {
          minuteStart: "2019-01-01T10:00:00",
          minuteEnd: "2019-02-01T12:00:00",
          minuteStartEmpty: "",
          minuteEndEmpty: ""
        },
        actions: [
          //pickColorжё¬и©ҰдёҚеҲ°

          //иө·е§ӢжҷӮй–“
          {
            mode: "eleclick",
            selector: 'div[TimedayCore="day"]',
            nth: 0
          },
          {
            mode: "eleclick",
            selector: 'button[type="button"]',
            nth: 11
          },
          {
            mode: "eleclick",
            selector: 'input[type="text"]',
            nth: 0
          },
          {
            mode: "eleclick",
            selector: "div.v-list-item__title",
            nth: 1
          },

          //зөҗжқҹжҷӮй–“
          {
            mode: "eleclick",
            selector: 'div[TimedayCore="day"]',
            nth: 1
          },
          {
            mode: "eleclick",
            selector: 'button[type="button"]',
            nth: 14
          },
          {
            mode: "eleclick",
            selector: 'input[type="text"]',
            nth: 1
          },
          {
            mode: "eleclick",
            selector: "div.v-list-item__title",
            nth: 1
          },

          {
            mode: "keypress",
            key: "Tab"
          },
          {
            mode: "elemove",
            selector: 'div[ShellEllipse="leftIcon"]',
            nth: -1
          }
        ]
      };
    },
    mounted: function() {
      return {};
    },
    computed: {},
    methods: {}
  });
    </script>
</body>
</html>
